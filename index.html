<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untitled - Minimalist Space</title>
    <style>
        /* Tumblr / Lofter 极简风格配色 */
        :root {
            --bg-color: #fafafa;
            --text-main: #222222;
            --text-muted: #888888;
            --border-light: #eeeeee;
            --accent: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* 窄版居中容器 */
        .container {
            max-width: 540px;
            margin: 60px auto;
            padding: 0 20px;
        }

        /* 头部：头像与简介 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        /* 头像容器及遮罩效果 */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 8px; /* 轻微圆角，比纯圆更复古 */
            object-fit: cover;
            display: block;
            background: #eee;
        }
        .avatar-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .avatar-wrapper:hover .avatar-overlay { opacity: 1; }

        .header h1 {
            font-size: 20px;
            font-weight: 500;
            margin: 15px 0 5px 0;
            letter-spacing: 1px;
        }
        .header p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }

        /* 极简导航 */
        .nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 10px;
        }
        .nav-item {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }
        .nav-item:hover { color: var(--accent); }
        .nav-item.active { color: var(--accent); font-weight: bold; }

        /* 内容区切换 */
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 输入区与按钮 */
        textarea {
            width: 100%;
            height: 150px;
            border: none;
            background: transparent;
            font-size: 15px;
            color: var(--text-main);
            resize: none;
            outline: none;
            font-family: inherit;
        }
        textarea::placeholder { color: #ccc; }
        
        .action-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }
        .btn {
            background: transparent;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            padding: 6px 16px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: var(--text-main);
            color: white;
        }

        /* 隐藏的文件上传组件 */
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <!-- 头像区域，点击触发上传 -->
            <div class="avatar-wrapper" onclick="document.getElementById('file-input').click()">
                <img src="https://via.placeholder.com/80/cccccc/ffffff?text=Avatar" alt="头像" class="avatar" id="avatar-img">
                <div class="avatar-overlay">更换头像</div>
            </div>
            <!-- 隐藏的文件选择器 -->
            <input type="file" id="file-input" accept="image/*" onchange="uploadImage(event, 'avatar')">
            
            <h1>我的碎片集</h1>
            <p>Somewhere only we know.</p>
        </div>

        <!-- 导航 -->
        <div class="nav">
            <div class="nav-item active" onclick="switchTab('text')">Text</div>
            <div class="nav-item" onclick="switchTab('photo')">Photo</div>
            <div class="nav-item" onclick="switchTab('link')">Link</div>
        </div>

        <!-- 文字区 -->
        <div id="text" class="tab-content active">
            <textarea id="editor" placeholder="记录当下的想法..."></textarea>
            <div class="action-row">
                <button class="btn" onclick="savePost('text')">Post</button>
            </div>
        </div>

        <!-- 图片区 -->
        <div id="photo" class="tab-content">
            <div style="text-align: center; padding: 40px; border: 1px dashed #ccc; cursor: pointer;" onclick="document.getElementById('photo-input').click()">
                <p style="color: #888;">点击选择图片上传</p>
            </div>
            <input type="file" id="photo-input" accept="image/*" style="display: none;" onchange="uploadImage(event, 'post')">
        </div>

        <!-- 链接区 -->
        <div id="link" class="tab-content">
            <input type="text" placeholder="输入链接 URL..." style="width: 100%; border: none; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 15px; outline: none; background: transparent; margin-bottom: 10px;">
            <input type="text" placeholder="链接描述..." style="width: 100%; border: none; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 15px; outline: none; background: transparent;">
            <div class="action-row" style="margin-top: 20px;">
                <button class="btn" onclick="savePost('link')">Add Link</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://你的worker地址.workers.dev';

        // 切换 Tab
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 上传图片（头像 或 博客图片）
        async function uploadImage(event, type) {
            const file = event.target.files[0];
            if (!file) return;

            // 1. 前端先预览 (不需要等后端)
            const reader = new FileReader();
            reader.onload = function(e) {
                if(type === 'avatar') {
                    document.getElementById('avatar-img').src = e.target.result;
                    // 这里可以加入保存头像地址到 localStorage 的逻辑
                } else {
                    alert("图片已选择，准备上传...");
                }
            }
            reader.readAsDataURL(file);

            // 2. 发送给后端 R2 存储
            const password = prompt("请输入密码以授权上传：");
            if(!password) return;

            try {
                // 将文件作为纯二进制流发送给后端
                const response = await fetch(`${API_BASE_URL}/upload-image?filename=${file.name}`, {
                    method: 'POST',
                    headers: { 'Admin-Password': password }, // 密码放在请求头，文件放在body
                    body: file
                });

                if(response.ok) {
                    const imageUrl = await response.text();
                    console.log("图片已存入 R2，公开访问地址: ", imageUrl);
                    if(type !== 'avatar') alert("图片上传成功！");
                } else {
                    alert("上传失败：密码错误或网络问题");
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 保存文字/链接伪代码
        function savePost(type) {
            alert("风格已替换为极简风。连接后端后即可正式发布！");
        }
    </script>
</body>
</html>
